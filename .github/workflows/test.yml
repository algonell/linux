name: test

on:
  push:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: prerequisites
      run: sudo apt-get install libelf-dev
    - name: make oldconfig
      run: yes '' | make oldconfig && scripts/config --disable SYSTEM_TRUSTED_KEYS && scripts/config --disable SYSTEM_REVOCATION_KEYS && scripts/config --disable CONFIG_DYNAMIC_DEBUG
    - name: smatch get
      run: git clone git://repo.or.cz/smatch.git && cd smatch && make
    - name: smatch run
      run: cd ../ && make CHECK="./smatch/smatch -p=kernel" C=1 modules
